<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#0d6e47,#1f8f63,#e9f7ef);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

.verify-card{

width:100%;
max-width:900px;

background:rgba(255,255,255,.92);

backdrop-filter:blur(20px);

border-radius:25px;

overflow:hidden;

box-shadow:
0 20px 50px rgba(0,0,0,.15);

}

.top-section{

background:linear-gradient(135deg,#0B7A4B,#19A463);

padding:40px;

text-align:center;

color:white;

}

.logo{

width:90px;
height:90px;

border-radius:50%;

background:white;

padding:10px;

object-fit:cover;

margin-bottom:15px;

}

.top-section h2{

font-weight:700;
margin-bottom:8px;

}

.top-section p{

opacity:.9;

}

.status{

display:inline-block;

padding:8px 20px;

background:#d1fae5;

color:#0f5132;

font-weight:600;

border-radius:50px;

margin-top:20px;

}

.status i{

color:#198754;

margin-right:6px;

}

.content{

padding:40px;

}

.data-box{

background:#f8f9fa;

border-radius:15px;

padding:18px 20px;

margin-bottom:15px;

transition:.3s;

border-left:5px solid #198754;

}

.data-box:hover{

transform:translateY(-2px);

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.label{

font-size:13px;

color:#777;

margin-bottom:5px;

text-transform:uppercase;

letter-spacing:1px;

}

.value{

font-size:18px;

font-weight:600;

color:#222;

}

.company-card{
    background:#ffffff;
    border:1px solid #e5e5e5;
    border-radius:18px;
    padding:25px;
    margin-top:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
}

.company-card h4{
    color:#0B7A4B;
    font-weight:700;
    margin-bottom:20px;
}

.company-item{
    display:flex;
    align-items:flex-start;
    margin-bottom:15px;
    gap:15px;
}

.company-item i{
    color:#198754;
    font-size:20px;
    width:25px;
    margin-top:3px;
}

.company-item span{
    color:#444;
    line-height:1.6;
}

.video-section{
    margin-top:30px;
}

.video-section h4{
    color:#0B7A4B;
    font-weight:700;
    margin-bottom:15px;
}

.video-wrapper{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    overflow:hidden;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.video-wrapper iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

.footer{

text-align:center;

padding:20px;

font-size:14px;

color:#888;

border-top:1px solid #eee;

}

.loading{

text-align:center;

padding:50px;

}

.spinner-border{

width:3rem;
height:3rem;

}

@media(max-width:768px){

.content{

padding:25px;

}

.top-section{

padding:30px;

}

}

.call-btn{

display:inline-flex;
align-items:center;
justify-content:center;
gap:10px;

margin-top:20px;

padding:12px 30px;

background:#fff;

color:#0B7A4B;

font-size:16px;
font-weight:700;

text-decoration:none;

border-radius:50px;

transition:.3s ease;

box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.call-btn:hover{

background:#198754;
color:#fff;

transform:translateY(-3px);

box-shadow:0 12px 25px rgba(0,0,0,.25);

}

.call-btn i{

font-size:18px;

}
    

</style>

</head>

<body>

<div class="verify-card">

<div class="top-section">

<img src="./GreenwayTrainingCenter.jpeg" class="logo">

<h2>Certification Data</h2>

<p>Greenway Technical College</p>

<div class="status">
<i class="fa-solid fa-circle-check"></i>
Verified Certificate
</div>

    <div class="mt-4">

<a href="tel:0741234567" class="call-btn">

<i class="fa-solid fa-phone"></i>

Call 1393

</a>

</div>

</div>

<div id="userData" class="content">

<div class="loading">

<div class="spinner-border text-success"></div>

<p class="mt-3">Loading certificate...</p>

</div>

</div>

<div class="footer">

Powered by Greenway Technical College for Foreign Employment © 2026

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBB1Lu7Njr3GguGPFUQnoU1GNExRnMdeVU",
authDomain: "qr-project-6f5cd.firebaseapp.com",
projectId: "qr-project-6f5cd",
storageBucket: "qr-project-6f5cd.appspot.com",
messagingSenderId: "724489680639",
appId: "1:724489680639:web:606bf485733128174e7eca",
measurementId: "G-HC7TYM28VW"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

function getNIC(){

const params=new URLSearchParams(window.location.search);

return params.get("nic");

}

async function loadData(){

const nic=getNIC();

if(!nic){

document.getElementById("userData").innerHTML=`

<div class="alert alert-danger">

<h5>NIC Not Provided</h5>

Please scan the QR code again.

</div>

`;

return;

}

try{

const q=query(
collection(db,"Students"),
where("nic","==",nic)
);

const snapshot=await getDocs(q);

if(snapshot.empty){

document.getElementById("userData").innerHTML=`

<div class="alert alert-warning">

<h5>No Record Found</h5>

Certificate could not be verified.

</div>

`;

return;

}

const data=snapshot.docs[0].data();

document.getElementById("userData").innerHTML=`

<div class="row">

<div class="col-md-6">

<div class="data-box">

<div class="label">Full Name</div>

<div class="value">${data.name}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">NIC</div>

<div class="value">${data.nic}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">Course</div>

<div class="value">${data.course}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">Course Code</div>

<div class="value">${data.course_code}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">Batch Number</div>

<div class="value">${data.batch_no}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">Certificate Number</div>

<div class="value">${data.certification_no}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">Start Date</div>

<div class="value">${data.start_date}</div>

</div>

</div>

<div class="col-md-6">

<div class="data-box">

<div class="label">End Date</div>

<div class="value">${data.end_date}</div>

</div>

</div>

<div class="col-12">

<div class="data-box">

<div class="label">Effective Date</div>

<div class="value">${data.eff_date}</div>

</div>

</div>

</div>

<div class="company-card">

    <h4>
        <i class="fa-solid fa-building"></i>
        Greenway Technical College
    </h4>

    <div class="company-item">
        <i class="fa-solid fa-location-dot"></i>
        <span>

        No.243, Hitinawatta, Mallwapitiya
        </span>
    </div>

    <div class="company-item">
        <i class="fa-solid fa-phone"></i>
        <span>
            1393
        </span>
    </div>

    <div class="company-item">
        <i class="fa-solid fa-mobile-screen"></i>
        <span>
            074 123 4567
        </span>
    </div>

    <div class="company-item">
        <i class="fa-solid fa-envelope"></i>
        <span>
            greenwaytechnicalcollege7@gmail.com
        </span>
    </div>

    <div class="company-item">
        <i class="fa-solid fa-globe"></i>
        <span>
            https://greenwaytech.lk/
        </span>
    </div>

</div>

<div class="video-section">

    <h4>
        <i class="fa-brands fa-youtube text-danger"></i>
        About Greenway Technical College
    </h4>

    <div class="video-wrapper">

       <iframe width="946" height="614" src="https://www.youtube.com/embed/Z_Xdnh205w8" title="Greenway Technical College for Foreign Employment | Construction Assistant Course | 2025" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </div>

</div>

`;

}

catch(error){

console.error(error);

document.getElementById("userData").innerHTML=`

<div class="alert alert-danger">

Something went wrong.

</div>

`;

}

}

loadData();

</script>

</body>
</html>
